stages:
  - build
  - publish


build docs:
  stage: build
  image: node-20_pnpm-9.3.0
  script:
    - pnpm i --frozen-lockfile 
    - pnpm run docs:build
    - cd docs/.vitepress/dist && zip -rq ../../../vitepress.zip ./*
  artifacts:
    paths:
      - vitepress.zip
    expire_in: 1h


publish docs:
  stage: publish
  image: node-20
  script:
    - bash ci/publish-vitepress.sh vitepress.zip

stages:
  - build
  - publish


build docs:
  stage: build
  image: node-20_pnpm-9.3.0
  script:
    - pnpm i --frozen-lockfile 
    - pnpm run docs:build
    - ls
    - cd storybook-static && zip -rq ../storybook.zip ./*
  artifacts:
    paths:
      - storybook.zip
    expire_in: 1h


publish docs:
  stage: publish
  image: node-20
  script:
    - bash ci/publish-storybook.sh storybook.zip
